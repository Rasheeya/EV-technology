<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth | STACKLY</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="./css/login.css">
  </head>
  <body>
    <div class="bg-glow"></div>
    <div class="auth-container">
      <a href="index.html" class="logo-link">
        <img src="assets/new-logo.webp" alt="Stackly Logo" class="logo-img" />
      </a>

      <div id="login-section" data-aos="fade-up">
        <h2 data-aos="fade-up" data-aos-delay="100">Welcome Back</h2>
        <p class="subtitle" data-aos="fade-up" data-aos-delay="200">
          Enter your credentials to access the circuit.
        </p>

        <form id="login-form" onsubmit="handleAuth(event, 'login')">
          <div class="form-group" data-aos="fade-up" data-aos-delay="300">
            <label>Login As</label>
            <select id="login-role" required>
              <option value="" disabled selected>Select Role</option>
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group" data-aos="fade-up" data-aos-delay="300">
            <label>Email Address</label>
            <input
              type="email"
              id="login-email"
              placeholder="name@company.com"
              required
            />
          </div>
          <div class="form-group" data-aos="fade-up" data-aos-delay="300">
            <label>Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="login-password"
                placeholder="••••••••"
                required
                minlength="8"
              />
              <i
                class=" fa-solid fa-eye toggle-password"
                onclick="togglePasswordVis('login-password', this)"
              ></i>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember" />
              <span>Remember me</span>
            </label>
            <a href="404.html" class="forgot-password">Forgot password?</a>
          </div>
          <button
            type="submit"
            class="submit-btn"
            id="login-btn"
            data-aos="fade-up"
           
          >
            Login to Account
          </button>
        </form>
        <p class="toggle-link">
          New here? <span onclick="toggleAuth()">Create an account</span>
        </p>
      </div>

      <div id="signup-section" class="hidden auth-card" data-aos="fade-up">
        <h2 data-aos="fade-up" data-aos-delay="100">Join the Grid</h2>
        <p class="subtitle" data-aos="fade-up" data-aos-delay="200">
          Start your journey with STACKLY.
        </p>

        <form id="signup-form" onsubmit="handleAuth(event, 'signup')">
          <div class="form-group">
            <label>Assign Role</label>
            <select id="signup-role" required>
              <option value="" disabled selected>Select Role</option>
              <option value="user">User (Customer)</option>
              <option value="admin">Admin (Staff)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <input
              type="text"
              id="signup-name"
              placeholder="John Doe"
              required
              minlength="2"
            />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input
              type="email"
              id="signup-email"
              placeholder="name@company.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="signup-password"
                placeholder="••••••••"
                required
                minlength="8"
              />
              <i
                class=" fa-solid fa-eye toggle-password"
                onclick="togglePasswordVis('signup-password', this)"
              ></i>
            </div>
          </div>
          <button type="submit" class="submit-btn" id="signup-btn">
            Create Account
          </button>
        </form>
        <p class="toggle-link">
          Already have an account?
          <span onclick="toggleAuth()">Log in instead</span>
        </p>
      </div>
    </div>

    <script>
      // Toggle between Login and Signup
      function toggleAuth() {
        document.getElementById("login-section").classList.toggle("hidden");
        document.getElementById("signup-section").classList.toggle("hidden");
        document.getElementById("login-form").reset();
        document.getElementById("signup-form").reset();
      }

      // Toggle Password Visibility
      function togglePasswordVis(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-solid fa-eye", "fa-solid fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.replace("fa-solid fa-eye-slash", "fa-solid fa-eye");
        }
      }

      // Handle Authentication Logic and Save Profile Data
      function handleAuth(event, type) {
        event.preventDefault();

        let email, role, name;

        if (type === "login") {
          email = document.getElementById("login-email").value;
          role = document.getElementById("login-role").value;
          name = "Welcome Back"; // Using placeholder since login doesn't ask for name
        } else {
          email = document.getElementById("signup-email").value;
          role = document.getElementById("signup-role").value;
          name = document.getElementById("signup-name").value;
        }

        if (email && role) {
          // Save to browser LocalStorage so dashboards can pick it up
          localStorage.setItem("userEmail", email);
          localStorage.setItem("userRole", role);
          localStorage.setItem(
            "userName",
            name !== "Welcome Back"
              ? name
              : role === "admin"
                ? "Administrator"
                : "Guest Driver",
          );

          // Success Animation/Feedback
          const btn =
            type === "login"
              ? document.getElementById("login-btn")
              : document.getElementById("signup-btn");
          btn.innerHTML =
            '<i class=" fa-solid fa-circle-notch fa-spin"></i> Connecting...';
          btn.style.opacity = "0.7";

          // Redirect logic based on role
       
            if (role === "admin") {
              window.location.href = "admin-dashboard.html";
            } else {
              window.location.href = "user-dashboard.html";
            }
       
        }
      }
    </script>

    <script>
      AOS.init({ duration: 1000, once: true });
    </script>
  </body>
</html>
